on:
  release:
    types: [published, created]
  workflow_dispatch: # Allow manual trigger
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v5
        with:
          github-server-url: https://git.bilt.me

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: Write env file
        run: printf "%s" "${{ secrets.ENV_FILE }}" > .env

      - name: Push EAS environment variables
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas env:push production --path .env --force

      - name: 🚀 Build app
        run: eas build --non-interactive --platform ios --auto-submit --json
